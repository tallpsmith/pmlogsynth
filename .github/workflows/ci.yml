name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  quality:
    name: "Quality (${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.x']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy pmlogsynth/
      - run: pytest tests/unit/ tests/integration/ -v

  e2e:
    name: "E2E (system Python + PCP)"
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - name: Install PCP
        run: |
          sudo apt-get update
          sudo apt-get install -y pcp python3-pcp
      - name: Install pmlogsynth (system Python)
        run: python3 -m pip install -e ".[dev]" --break-system-packages
      - name: Run E2E tests
        run: python3 -m pytest tests/e2e/ -v
