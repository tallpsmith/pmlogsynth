name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  quality:
    name: "Quality (system Python + PCP)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PCP
        run: |
          sudo apt-get update
          sudo apt-get install -y pcp python3-pcp
      - name: Install pmlogsynth
        run: python3 -m pip install -e ".[dev]" --break-system-packages
      - run: ruff check .
      - run: python3 -m mypy pmlogsynth/
      - run: python3 -m pytest tests/tier1/ tests/tier2/ -v

  e2e:
    name: "E2E (system Python + PCP)"
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - name: Install PCP
        run: |
          sudo apt-get update
          sudo apt-get install -y pcp python3-pcp
      - name: Install pmlogsynth (system Python)
        run: python3 -m pip install -e ".[dev]" --break-system-packages
      - name: Run E2E tests
        run: python3 -m pytest tests/e2e/ -v
