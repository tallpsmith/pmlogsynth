meta:
  hostname: prod-sim
  timezone: UTC
  duration: 24h
  interval: 60
  noise: 0.03

host:
  profile: generic-large

phases:
  # Midnight–6am: dead quiet overnight baseline
  - name: overnight
    duration: 6h
    cpu:
      utilization: 0.12
      user_ratio: 0.65
      sys_ratio: 0.25
      iowait_ratio: 0.10
    memory:
      used_ratio: 0.35
      cache_ratio: 0.40
    disk:
      read_mbps: 15.0
      write_mbps: 8.0
    network:
      rx_mbps: 20.0
      tx_mbps: 5.0

  # 6am–10am: morning ramp as users and jobs arrive
  - name: morning-ramp
    duration: 4h
    transition: linear
    cpu:
      utilization: 0.88
      user_ratio: 0.72
      sys_ratio: 0.18
      iowait_ratio: 0.10
    memory:
      used_ratio: 0.78
      cache_ratio: 0.15
    disk:
      read_mbps: 480.0
      write_mbps: 190.0
    network:
      rx_mbps: 750.0
      tx_mbps: 190.0

  # 10am–4pm: sustained business-hours peak
  - name: business-peak
    duration: 6h
    cpu:
      utilization: 0.90
      user_ratio: 0.72
      sys_ratio: 0.18
      iowait_ratio: 0.10
    memory:
      used_ratio: 0.80
      cache_ratio: 0.14
    disk:
      read_mbps: 500.0
      write_mbps: 200.0
    network:
      rx_mbps: 800.0
      tx_mbps: 200.0

  # 4pm–midnight: gradual evening roll-off (linear down to overnight levels)
  - name: evening-rolloff
    duration: 8h
    transition: linear
    cpu:
      utilization: 0.12
      user_ratio: 0.65
      sys_ratio: 0.25
      iowait_ratio: 0.10
    memory:
      used_ratio: 0.35
      cache_ratio: 0.40
    disk:
      read_mbps: 15.0
      write_mbps: 8.0
    network:
      rx_mbps: 20.0
      tx_mbps: 5.0
