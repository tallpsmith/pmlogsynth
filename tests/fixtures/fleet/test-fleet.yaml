meta:
  name: test-fleet
  duration: 600
  interval: 60
  hostname_prefix: host
  hardware: generic-small

profiles:
  baseline:
    phases:
      - name: steady
        duration: 600
        cpu:
          utilization: 0.50
          user_ratio: 0.70
          sys_ratio: 0.20
          iowait_ratio: 0.10
        memory:
          used_ratio: 0.40
          cache_ratio: 0.20
        disk:
          read_mbps: 10.0
          write_mbps: 5.0
        network:
          rx_mbps: 100.0
          tx_mbps: 50.0
          error_rate: 0.001

  bad-cpu:
    phases:
      - name: saturated
        duration: 600
        cpu:
          utilization: 0.96
          user_ratio: 0.85
          sys_ratio: 0.10
          iowait_ratio: 0.05
        memory:
          used_ratio: 0.70
          cache_ratio: 0.10

hosts:
  count: 5
  baseline: baseline
  jitter: 0.05

bad_actors:
  count: 1
  jitter: 0.15
  profiles:
    - bad-cpu
